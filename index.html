<!DOCTYPE html>
<html lang="en">
<head>

    <title>Chhatrapati Gramvikas Bahuuddeshiya Sanstha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; }
        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        .video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(15, 23, 42, 0.4), rgba(6, 78, 59, 0.7)); z-index: 0; }
        .glow-btn { box-shadow: 0 0 15px rgba(52, 211, 153, 0.2); backdrop-blur: md; transition: all 0.3s ease; }
        .glow-btn:hover { box-shadow: 0 0 25px rgba(52, 211, 153, 0.6); transform: translateY(-2px); }
        .dropdown-menu { opacity: 0; visibility: hidden; transform: translateY(10px); transition: all 0.3s ease; }
        .group:hover .dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between relative overflow-x-hidden">

    <video class="video-bg" autoplay loop muted playsinline>
